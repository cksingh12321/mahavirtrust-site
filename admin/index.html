<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Content Admin — Mahavir Singh Memorial Trust</title>
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <link rel="stylesheet" href="/admin/admin.css?v=3">
</head>
<body>

  <div class="app-shell" id="app" hidden>
    <header class="app-header">
      <a href="/" class="brand">
        <img src="/assets/img/favicon.png" alt="">
        <span>Mahavir Trust CMS</span>
      </a>
      <div class="app-meta">
        <span class="who" id="who"></span>
        <button id="logout-btn" type="button">Sign out</button>
      </div>
    </header>

    <nav class="tabs" role="tablist">
      <button data-tab="news" class="active" role="tab">Trust News</button>
      <button data-tab="blog" role="tab">Blog</button>
      <button data-tab="press" role="tab">Press</button>
    </nav>

    <main class="app-body">
      <div class="toolbar">
        <div>
          <h2 id="tab-title">Trust News</h2>
          <p id="tab-sub">Official announcements, milestones and event reports.</p>
        </div>
        <div>
          <button class="btn btn-ghost" id="reload-btn" type="button">Reload</button>
          <button class="btn btn-saffron" id="add-btn" type="button">+ Add entry</button>
        </div>
      </div>

      <div id="entries" class="entry-list">
        <div class="spinner-block">Loading…</div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="/admin/dashboard.js?v=3"></script>
</body>
</html>
